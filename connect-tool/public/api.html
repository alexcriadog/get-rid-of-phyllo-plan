<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Camaleonic Connect API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Public API for the Camaleonic Connect SaaS — connect social
        accounts and read normalized profile/audience/content data across
        six platforms."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafafa;
      }
    </style>
  </head>
  <body>
    <redoc spec-url="/openapi.yaml" theme='{ "colors": { "primary": { "main": "#3cffd0" } }, "typography": { "fontFamily": "system-ui, sans-serif" } }'></redoc>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
    <script>
      // Redoc renders tag groups (SDK Tokens / Accounts / Webhooks) collapsed
      // by default. label.click() is a TOGGLE — calling it on an already-open
      // group closes it again. Use aria-expanded as the source of truth.
      //
      // We poll every 400ms for the first 10 seconds because Redoc's
      // scroll-spy re-collapses groups when the user (or the load-time
      // ScrollIntoView) lands them outside the active section. Once all 3
      // tag groups are expanded twice in a row, stop polling.
      (function () {
        var stableTicks = 0;
        var interval = setInterval(function () {
          var tags = document.querySelectorAll(
            'li[data-item-id^="tag/"]:not([data-item-id*="/paths/"])',
          );
          if (tags.length === 0) return;
          var allOpen = true;
          tags.forEach(function (item) {
            var label = item.querySelector('label');
            if (item.getAttribute('aria-expanded') === 'false' && label) {
              label.click();
              allOpen = false;
            }
          });
          stableTicks = allOpen ? stableTicks + 1 : 0;
          if (stableTicks >= 3) clearInterval(interval);
        }, 400);
        setTimeout(function () {
          clearInterval(interval);
        }, 10_000);
      })();
    </script>
  </body>
</html>
