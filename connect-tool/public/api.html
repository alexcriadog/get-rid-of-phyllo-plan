<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Camaleonic Connect API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Public API for the Camaleonic Connect SaaS — connect social accounts and read normalized profile/audience/content data across six platforms."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        /* Brand tokens picked up by Scalar via its `--scalar-*` overrides
           on .light-mode / .dark-mode. */
        --scalar-color-1: #f4f4f4;
        --scalar-color-accent: #3cffd0;
        --scalar-background-1: #0e0e0e;
        --scalar-background-2: #161616;
        --scalar-background-3: #1c1c1c;
        --scalar-border-color: #2a2a2a;
        --scalar-font: 'Space Grotesk', system-ui, sans-serif;
        --scalar-font-code: 'Space Mono', ui-monospace, monospace;
      }
      body {
        margin: 0;
        background: #0e0e0e;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Scalar renders every operation in the spec, grouped by tag,
         expanded by default. No menu toggling, no missing endpoints. -->
    <script
      id="api-reference"
      data-url="/openapi.yaml"
      data-configuration='{
        "theme": "default",
        "darkMode": true,
        "layout": "modern",
        "showSidebar": true,
        "defaultOpenAllTags": true,
        "hideDownloadButton": false,
        "metaData": {
          "title": "Camaleonic Connect API",
          "description": "Public REST API to read normalized social-account data across Facebook, Instagram, TikTok, Threads, YouTube, and Twitch."
        }
      }'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
