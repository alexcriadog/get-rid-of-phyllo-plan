<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Card background — soft-rounded dark tile with a mint hairline border to
       echo the dashboard's brutalist surface. -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0e0e0e" stroke="#3cffd0" stroke-width="2.5" />

  <!-- UV accent in the bottom-left corner so the icon reads as "Connector"
       (multi-platform) at glance — three colour family hint. -->
  <path d="M2 44 L2 50 Q2 62 14 62 L20 62 Z" fill="#5200ff" opacity="0.55" />

  <!-- Network: two outer (white) nodes wired into one bright mint hub, the
       hub glowing to mark the live signal. -->
  <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.85">
    <line x1="20" y1="20" x2="40" y2="38" />
    <line x1="46" y1="18" x2="40" y2="38" />
  </g>

  <!-- Outer satellite nodes -->
  <circle cx="20" cy="20" r="4.5" fill="#ffffff" />
  <circle cx="46" cy="18" r="4.5" fill="#ffffff" />

  <!-- Hub node (mint) with a soft halo -->
  <circle cx="40" cy="40" r="11" fill="#3cffd0" opacity="0.18" />
  <circle cx="40" cy="40" r="7.5" fill="#3cffd0" />
  <circle cx="40" cy="40" r="2.6" fill="#0e0e0e" />
</svg>
