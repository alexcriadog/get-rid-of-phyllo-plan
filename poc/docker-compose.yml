version: '3.9'

# Common app config — same image, same env, same source mount. Each of the
# three Nest entry points (api / worker / scheduler) is just a different
# argv, so we factor the boilerplate into x-app-base via YAML anchors.
x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  image: poc-app
  env_file:
    - ./.env
  environment:
    # Override the localhost URLs in .env so the in-container processes
    # talk to the sibling containers via the compose network.
    DATABASE_URL: "mysql://connector_user:connector_pw@mysql:3306/connector"
    MONGO_URL: "mongodb://mongo:27017/connector_ui"
    REDIS_URL: "redis://redis:6379"
    NODE_ENV: development
  volumes:
    # Bind-mount source so host edits propagate without rebuild.
    - ./src:/app/src
    - ./prisma:/app/prisma
    - ./tsconfig.json:/app/tsconfig.json
    - ./tsconfig.build.json:/app/tsconfig.build.json
    - ./nest-cli.json:/app/nest-cli.json
    # Keep the linux node_modules from the image — don't let the host's
    # macOS-ARM modules shadow them.
    - app_node_modules:/app/node_modules
  depends_on:
    mysql:
      condition: service_healthy
    mongo:
      condition: service_started
    redis:
      condition: service_started
  restart: unless-stopped
  # sm.demo (dev backend) resolves to a Netbird-only IP, but this connector EC2
  # is not on the Netbird mesh — pin sm.demo to the dev backend's public IP so
  # webhook deliveries don't time out (the dev backend SG already allows this
  # connector's public IP on 443). 2026-06-12: deploy's `git reset --hard` was
  # wiping the ephemeral host entry; committing it makes it survive deploys.
  extra_hosts:
    - "sm.demo.camaleonicanalytics.com:98.85.32.44"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: connector
      MYSQL_USER: connector_user
      MYSQL_PASSWORD: connector_pw
    ports: ["3306:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    environment:
      MONGO_INITDB_DATABASE: connector_ui

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  api:
    <<: *app-base
    container_name: poc-api
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "src/main.ts", "api"]
    ports: ["3000:3000"]

  worker:
    <<: *app-base
    container_name: poc-worker
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "src/main.ts", "worker"]

  scheduler:
    <<: *app-base
    container_name: poc-scheduler
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "src/main.ts", "scheduler"]

  # ── connect-tool — TRANSIENT OAuth helper (not part of POC core) ──────
  # Lives at ../connect-tool/. Only legitimate caller of /admin/connect/seed
  # in production. Delete this service block and `rm -rf ../connect-tool/`
  # to remove. See connect-tool/README.md.
  connect-tool:
    build:
      context: ../connect-tool
      dockerfile: Dockerfile
    image: poc-connect-tool
    container_name: poc-connect-tool
    env_file:
      - ../connect-tool/.env
    environment:
      POC_API_URL: "http://api:3000"
      PUBLIC_BASE_URL: "${CONNECT_TOOL_PUBLIC_URL:-http://localhost:3002}"
      POC_ADMIN_URL: "${POC_ADMIN_URL:-http://localhost:3001/admin}"
      NEXT_PUBLIC_POC_ADMIN_URL: "${POC_ADMIN_URL:-http://localhost:3001/admin}"
      # Shared Redis (same instance the POC core uses) — backs the OAuth
      # session store so connect-tool is stateless / horizontally scalable.
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    ports: ["3002:3002"]
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  app_node_modules:
